name: SEO Rank Update Robot

on:
  # -------------------------------------------------------
  # NO schedule here intentionally.
  # This workflow is triggered ONLY by cron-job.org
  # which calls the workflow_dispatch event at exactly
  # 9:00 AM IST every Monday. Removing the GitHub schedule
  # prevents double-runs (GitHub scheduler + cron-job.org).
  # To trigger manually: GitHub Actions tab → Run workflow
  # -------------------------------------------------------
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Update Script
        env:
          API_LOGIN: ${{ secrets.API_LOGIN }}
          API_PASSWORD: ${{ secrets.API_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python cron_job.py
